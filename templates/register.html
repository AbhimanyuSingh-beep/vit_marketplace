{% extends "base.html" %}
{% block title %}Register — VIT Marketplace{% endblock %}
{% block extra_css %}
<style>
.auth-box { max-width:420px; margin:3rem auto; }
.auth-box h2 { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; margin-bottom:0.3rem; }
.auth-box p { color:var(--muted); margin-bottom:2rem; }
.auth-form { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:2rem; }
.auth-link { text-align:center; margin-top:1.2rem; color:var(--muted); font-size:0.9rem; }
.auth-link a { color:var(--accent); text-decoration:none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-box">
  <h2>Join VITMarket 🎓</h2>
  <p>Create your free account and start buying & selling</p>
  <div class="auth-form">
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Abhimanyu Singh" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@gmail.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:0.8rem;">Create Account</button>
    </form>
  </div>
  <div class="auth-link">Already have an account? <a href="/login">Login</a></div>
</div>
{% endblock %}
